<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="MeetSpace - Real-time Video Calling Platform"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- ✅ SUPPRESS BROWSER EXTENSION ERRORS -->
    <script>
      // Suppress the "message channel closed" error from browser extensions
      (function() {
        // Store original console.error
        const originalError = console.error;
        
        // Override console.error to filter extension errors
        console.error = function(...args) {
          // Check if it's an extension-related error
          const isExtensionError = args.some(arg => 
            typeof arg === 'string' && (
              arg.includes('message channel closed') ||
              arg.includes('Extension context invalidated') ||
              arg.includes('Receiving end does not exist') ||
              arg.includes('chrome-extension://') ||
              arg.includes('moz-extension://')
            )
          );
          
          // Only show non-extension errors
          if (!isExtensionError) {
            originalError.apply(console, args);
          }
        };

        // Handle unhandled promise rejections from extensions
        window.addEventListener('unhandledrejection', function(event) {
          const message = event.reason?.message || '';
          
          if (
            message.includes('message channel closed') ||
            message.includes('Extension context invalidated') ||
            message.includes('Receiving end does not exist')
          ) {
            event.preventDefault(); // Prevent error from showing in console
            console.log('🔇 Extension error suppressed (this is normal)');
          }
        });

        // Handle regular errors from extensions
        window.addEventListener('error', function(event) {
          const message = event.message || '';
          
          if (
            message.includes('message channel closed') ||
            message.includes('Extension context invalidated')
          ) {
            event.preventDefault();
            return true; // Prevent default error handling
          }
        });
      })();
    </script>
    
    <title>MeetSpace - Video Calling Platform</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
